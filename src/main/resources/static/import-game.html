<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Importer une Partie - Puissance 4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            color: #999;
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .section {
            margin-bottom: 30px;
        }
        
        .section-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .section-title::before {
            content: '';
            display: inline-block;
            width: 4px;
            height: 20px;
            background: #667eea;
            border-radius: 2px;
        }
        
        .upload-box {
            border: 2px dashed #667eea;
            border-radius: 10px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
            margin-bottom: 20px;
        }
        
        .upload-box:hover {
            border-color: #764ba2;
            background: #f0f1ff;
            transform: translateY(-2px);
        }
        
        #fileInput {
            display: none;
        }
        
        .upload-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        
        .upload-text {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }
        
        .upload-subtext {
            color: #999;
            font-size: 12px;
        }
        
        .file-info {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
        }
        
        .file-info.show {
            display: block;
        }
        
        .file-info strong {
            color: #2e7d32;
        }
        
        .or-separator {
            display: flex;
            align-items: center;
            margin: 30px 0;
        }
        
        .or-separator::before,
        .or-separator::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #ddd;
        }
        
        .or-separator span {
            padding: 0 15px;
            color: #999;
            font-size: 14px;
        }
        
        .input-group {
            margin-bottom: 15px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
            font-size: 14px;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .sequence-hint {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-import {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-import:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-import:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-back {
            background: #f0f0f0;
            color: #333;
        }
        
        .btn-back:hover {
            background: #e0e0e0;
        }
        
        .message {
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }
        
        .message.show {
            display: block;
        }
        
        .message.success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }
        
        .message.error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }
        
        .message.info {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            color: #1565c0;
        }
        
        .message.warning {
            background: #fff3e0;
            border-left: 4px solid #ff9800;
            color: #e65100;
        }
        
        .message-title {
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .loading.show {
            display: block;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 24px;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📥 Importer une Partie</h1>
        <p class="subtitle">Chargez une partie depuis un fichier ou entrez manuellement la séquence</p>
        
        <div class="message" id="messageDiv"></div>
        <div class="loading" id="loadingDiv">
            <div class="spinner"></div>
            <p>Importation en cours...</p>
        </div>
        
        <!-- Méthode 1: Upload fichier -->
        <div class="section">
            <div class="section-title">Via Fichier</div>
            <div class="upload-box" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📋</div>
                <div class="upload-text">Glissez-déposez un fichier</div>
                <div class="upload-subtext">ou cliquez pour parcourir (ex: 3131313.txt)</div>
                <input type="file" id="fileInput" accept=".txt">
            </div>
            <div class="file-info" id="fileInfo"></div>
        </div>
        
        <!-- Séparateur -->
        <div class="or-separator">
            <span>OU</span>
        </div>
        
        <!-- Méthode 2: Entrée manuelle -->
        <div class="section">
            <div class="section-title">Entrée Manuelle</div>
            <div class="input-group">
                <label for="sequenceInput">Séquence de coups</label>
                <input type="text" id="sequenceInput" placeholder="Ex: 3131313" maxlength="81">
                <div class="sequence-hint">Colonnes 1-9, max 81 coups sur un plateau 9×9</div>
            </div>
        </div>
        
        <!-- Boutons d'action -->
        <div class="button-group">
            <button class="btn-import" onclick="importGame()">📤 Importer la Partie</button>
            <button class="btn-back" onclick="window.history.back()">← Retour</button>
        </div>
    </div>
    
    <script>
        const fileInput = document.getElementById('fileInput');
        const sequenceInput = document.getElementById('sequenceInput');
        const fileInfo = document.getElementById('fileInfo');
        const messageDiv = document.getElementById('messageDiv');
        const loadingDiv = document.getElementById('loadingDiv');
        
        // Drag and drop
        document.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation();
        });
        
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            e.stopPropagation();
            
            if (e.dataTransfer.files.length > 0) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelected();
            }
        });
        
        fileInput.addEventListener('change', handleFileSelected);
        sequenceInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                importGame();
            }
        });
        
        function handleFileSelected() {
            const file = fileInput.files[0];
            if (!file) return;
            
            // Extraire la séquence du nom du fichier
            const filename = file.name;
            const sequenceMatch = filename.match(/^([0-9]+)\.txt$/);
            
            if (!sequenceMatch) {
                showMessage('Le nom du fichier doit être au format: [séquence].txt (ex: 3131313.txt)', 'error');
                fileInput.value = '';
                fileInfo.classList.remove('show');
                return;
            }
            
            const sequence = sequenceMatch[1];
            sequenceInput.value = sequence;
            
            fileInfo.innerHTML = `<strong>✓ Fichier trouvé:</strong> "${filename}" (${sequence.length} coups)`;
            fileInfo.classList.add('show');
            
            showMessage('', '');
        }
        
        async function importGame() {
            const sequence = sequenceInput.value.trim();
            
            if (!sequence) {
                showMessage('Veuillez entrer une séquence ou charger un fichier', 'error');
                return;
            }
            
            // Valider que ce sont des chiffres 1-9
            if (!/^[1-9]+$/.test(sequence)) {
                showMessage('La séquence doit contenir uniquement des chiffres 1-9', 'error');
                return;
            }
            
            if (sequence.length > 81) {
                showMessage('La séquence ne peut pas dépasser 81 coups (9×9)', 'error');
                return;
            }
            
            loadingDiv.classList.add('show');
            messageDiv.classList.remove('show');
            
            try {
                const response = await fetch(`/api/game/import?sequence=${encodeURIComponent(sequence)}`, {
                    method: 'POST'
                });
                
                const data = await response.json();
                loadingDiv.classList.remove('show');
                
                if (data.imported && data.success) {
                    showMessage(
                        `✓ Partie importée avec succès!\nPartie #${data.gameId} - ${data.nbCoups} coups\nStatut: ${data.gameStatus}`,
                        'success'
                    );
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 2000);
                } else if (!data.success && data.existingGameId) {
                    showMessage(
                        `⚠️ Cette partie existe déjà!\nPartie #${data.existingGameId} - Statut: ${data.existingGameStatus}`,
                        'warning'
                    );
                } else if (data.message) {
                    showMessage(data.message, 'error');
                } else {
                    showMessage('Erreur lors de l\'importation', 'error');
                }
            } catch (error) {
                loadingDiv.classList.remove('show');
                showMessage('Erreur: ' + error.message, 'error');
            }
        }
        
        function showMessage(text, type) {
            if (!text) {
                messageDiv.classList.remove('show');
                return;
            }
            
            messageDiv.className = `message show ${type}`;
            
            if (type === 'success') {
                messageDiv.innerHTML = `<div class="message-title">✓ Succès</div>${text}`;
            } else if (type === 'error') {
                messageDiv.innerHTML = `<div class="message-title">✗ Erreur</div>${text}`;
            } else if (type === 'warning') {
                messageDiv.innerHTML = `<div class="message-title">⚠️ Information</div>${text}`;
            } else {
                messageDiv.innerHTML = text;
            }
        }
    </script>
</body>
</html>
