<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puissance 4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modal.css">
</head>
<body>
    <div id="panel">
        <h1>PUISSANCE 4</h1>
        <div id="choix">        
                <button id="jvjButton" onclick="choisirMode(event)">Jouer</button>
                <button id="historyButton" onclick="showGameHistory()" style="background-color: #FF6B00;">Historique</button>
        </div>

        <div class="game-container" >
            <div class="grille" >
                    <div id="gameBoard"></div>
                    <div class="game-controls">
                        <button id="resetButton" onclick="resetGame()">Recommencer</button>
                        <button id="undoButton" onclick="undoMove()">Annuler le dernier coup</button>
                        <button id="arriereButton" onclick="goBack()">Menu</button>
                    </div>
            </div>

            <div class="side-menu">
                <h3>Paramètres</h3>
                <div class="menu-section">
                    <h4>Mode de jeu</h4>
                    <button onclick="changerMode('jvj')" class="menu-btn">Joueur vs Joueur</button>
                    <button onclick="changerMode('jvia')" class="menu-btn">Joueur vs IA</button>
                </div>
                <div class="menu-section">
                    <h4>Difficulté IA</h4>
                    <div class="difficulty-buttons">
                        <button onclick="changerDifficulte(1)" class="diff-btn" data-level="1">Facile</button>
                        <button onclick="changerDifficulte(3)" class="diff-btn active" data-level="3">Moyen</button>
                        <button onclick="changerDifficulte(5)" class="diff-btn" data-level="5">Difficile</button>
                    </div>
                </div>
                <div class="menu-section">
                    <h4>Informations</h4>
                    <div id="gameInfo">
                        <p><strong>Mode:</strong> <span id="currentMode">-</span></p>
                        <p><strong>Difficulté:</strong> <span id="currentDifficulty">Moyen</span></p>
                        <p><strong>Tour:</strong> <span id="turnCount">0</span></p>
                    </div>
                </div>
                <div class="menu-section">
                    <h4>Statistiques</h4>
                    <div id="statsBox" class="stats-box" style="padding:10px; background:#f9f9f9; border-radius:5px; font-size:0.85em;">
                        <p id="statsTotalGames" style="margin:3px 0;">Total: <strong>-</strong></p>
                        <p id="statsHumanWins" style="margin:3px 0;">Humain: <strong>-</strong></p>
                        <p id="statsAiWins" style="margin:3px 0;">IA: <strong>-</strong></p>
                        <p id="statsDraws" style="margin:3px 0;">Nuls: <strong>-</strong></p>
                        <button onclick="loadStats()" class="menu-btn" style="margin-top:5px;">Actualiser</button>
                    </div>
                </div>
                <div class="menu-section">
                    <h4>Analyser Image</h4>
                    <div id="imageAnalysisBox" style="padding:10px; background:#f0f9ff; border-radius:5px; text-align:center;">
                        <input type="file" id="imageUpload" accept="image/*" style="margin-bottom:10px; font-size:0.8em;">
                        <button onclick="analyzeImage()" class="menu-btn" style="margin-top:5px;">Analyser</button>
                        <p id="analysisResult" style="margin:10px 0; font-size:0.85em; color:#333;">Uploadez une image...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Historique -->
    <div id="historyModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeGameHistory()">&times;</span>
            <h2>Historique des Parties</h2>
            
            <!-- Section d'importation -->
            <div id="importSection" style="margin-bottom: 25px; padding: 15px; background: #f0f9ff; border-radius: 8px; border-left: 4px solid #2196f3;">
                <h3 style="margin-top: 0; color: #1565c0;">Importer une Partie</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="file" id="historyFileInput" accept=".txt" placeholder="Fichier .txt" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px;">
                    <button onclick="importGameFromFile()" style="padding: 8px 15px; background: #2196f3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">📤 Importer</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="historySequenceInput" placeholder="Ou entrez la séquence (ex: 3131313)" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px;">
                    <button onclick="importGameFromSequence()" style="padding: 8px 15px; background: #2196f3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">↑ Importer</button>
                </div>
                <div id="importMessage" style="margin-top: 10px; display: none; padding: 10px; border-radius: 5px; font-size: 12px;"></div>
            </div>
            
            <div id="historyList" class="history-list">
                <p>Chargement...</p>
            </div>
        </div>
    </div>

    <!-- Modal Choix de Couleur -->
    <div id="colorModal" class="modal" style="display:none;">
        <div class="modal-content" style="text-align: center; max-width: 400px;">
            <h2 style="margin-bottom: 20px;">Choisir votre couleur</h2>
            <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 20px;">
                <div style="cursor: pointer; text-align: center;" onclick="confirmColorChoice('red')">
                    <div style="width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #FF6B6B, #DC143C); border: 4px solid #8B0000; border-radius: 50%; margin: 0 auto 10px; box-shadow: 0 4px 10px rgba(139,0,0,0.5);"></div>
                    <button style="padding: 10px 20px; background: #DC143C; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">ROUGE</button>
                </div>
                <div style="cursor: pointer; text-align: center;" onclick="confirmColorChoice('yellow')">
                    <div style="width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #FFED4E, #FFD700); border: 4px solid #B8860B; border-radius: 50%; margin: 0 auto 10px; box-shadow: 0 4px 10px rgba(184,134,11,0.5);"></div>
                    <button style="padding: 10px 20px; background: #FFD700; color: #333; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">JAUNE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
