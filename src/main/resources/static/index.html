<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puissance 4</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/modal.css">
</head>
<body>
    <div id="panel">
        <h1>PUISSANCE 4</h1>
        <div id="choix">        
                <button id="jvjButton" onclick="choisirMode(event)">Jouer</button>
                <button id="historyButton" onclick="showGameHistory()" style="background-color: #FF6B00;">Historique</button>
                <button id="analyzeSequenceButton" onclick="openSequenceAnalysisModal()" style="background-color: #8B4513;">Analyser Séquence</button>
        </div>

        <div class="game-container" >
            <div class="grille" >
                    <div id="statusMessage"></div>
                    <div id="gameBoard"></div>
                    <div id="suggestionMessage" style="display:none; margin-top:15px; padding:12px; min-height:24px; background:linear-gradient(135deg, #667eea 0%, #764ba2 100%); color:white; border-radius:8px; font-weight:bold; text-align:center; font-size:16px;"></div>
                    <div class="game-controls">
                        <button id="resetButton" onclick="resetGame()">Recommencer</button>
                        <button id="undoButton" onclick="undoMove()">Annuler le dernier coup</button>
                        <button id="arriereButton" onclick="goBack()">Menu</button>
                    </div>
            </div>

            <div class="side-menu">
                <h3>Paramètres</h3>
                <div class="menu-section">
                    <h4>Mode de jeu</h4>
                    <button onclick="changerMode('jvj')" class="menu-btn">Joueur vs Joueur</button>
                    <button onclick="changerMode('jvia')" class="menu-btn">Joueur vs IA</button>
                </div>
                <div class="menu-section">
                    <h4>Difficulté IA</h4>
                    <div class="difficulty-buttons">
                        <button onclick="changerDifficulte(1)" class="diff-btn" data-level="1">Facile</button>
                        <button onclick="changerDifficulte(3)" class="diff-btn active" data-level="3">Moyen</button>
                        <button onclick="changerDifficulte(5)" class="diff-btn" data-level="5">Difficile</button>
                    </div>
                </div>
                <div class="menu-section">
                    <h4>Informations</h4>
                    <div id="gameInfo">
                        <p><strong>Mode:</strong> <span id="currentMode">-</span></p>
                        <p><strong>Difficulté:</strong> <span id="currentDifficulty">Moyen</span></p>
                        <p><strong>Tour:</strong> <span id="turnCount">0</span></p>
                    </div>
                </div>
                <div class="menu-section">
                    <h4>Statistiques</h4>
                    <div id="statsBox" class="stats-box" style="padding:10px; background:#f9f9f9; border-radius:5px; font-size:0.85em;">
                        <p id="statsTotalGames" style="margin:3px 0;">Total: <strong>-</strong></p>
                        <p id="statsHumanWins" style="margin:3px 0;">Humain: <strong>-</strong></p>
                        <p id="statsAiWins" style="margin:3px 0;">IA: <strong>-</strong></p>
                        <p id="statsDraws" style="margin:3px 0;">Nuls: <strong>-</strong></p>
                        <button onclick="loadStats()" class="menu-btn" style="margin-top:5px;">Actualiser</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Modal Historique -->
    <div id="historyModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close" onclick="closeGameHistory()">&times;</span>
            <h2>Historique des Parties</h2>
            
            <!-- Section d'importation -->
            <div id="importSection" style="margin-bottom: 25px; padding: 15px; background: #f0f9ff; border-radius: 8px; border-left: 4px solid #2196f3;">
                <h3 style="margin-top: 0; color: #1565c0;">Importer une Partie</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="file" id="historyFileInput" accept=".txt" placeholder="Fichier .txt" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px;">
                    <button onclick="importGameFromFile()" style="padding: 8px 15px; background: #2196f3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">📤 Importer</button>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="historySequenceInput" placeholder="Ou entrez la séquence (ex: 3131313)" style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px;">
                    <button onclick="importGameFromSequence()" style="padding: 8px 15px; background: #2196f3; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">↑ Importer</button>
                </div>
                <div id="importMessage" style="margin-top: 10px; display: none; padding: 10px; border-radius: 5px; font-size: 12px;"></div>
            </div>
            
            <div id="historyList" class="history-list">
                <p>Chargement...</p>
            </div>
        </div>
    </div>

    <!-- Modal Choix du Mode de Jeu -->
    <div id="gameModeModal" class="modal" style="display:none;">
        <div class="modal-content" style="text-align: center; max-width: 450px;">
            <h2 style="margin-bottom: 20px;">Quel mode de jeu ?</h2>
            <div style="display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; flex-wrap: wrap;">
                <div style="cursor: pointer; text-align: center; flex: 1; min-width: 150px;" onclick="selectGameMode('jvj')">
                    <div style="font-size: 3em; margin-bottom: 10px;">JvJ</div>
                    <button style="padding: 12px 20px; background: #8b5cf6; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%;">HUMAIN VS HUMAIN</button>
                </div>
                <div style="cursor: pointer; text-align: center; flex: 1; min-width: 150px;" onclick="selectGameMode('jvia')">
                    <div style="font-size: 3em; margin-bottom: 10px;">JvIA</div>
                    <button style="padding: 12px 20px; background: #10b981; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%;">HUMAIN VS IA</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Analyse Séquence -->
    <div id="sequenceAnalysisModal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width: 600px; text-align: center;">
            <span class="close" onclick="closeSequenceAnalysisModal()">&times;</span>
            <h2 style="margin-bottom: 20px;">Analyser une Séquence</h2>
            
            <div style="margin-bottom:15px;">
                <label style="font-size:0.85em; display:block; margin-bottom:8px; font-weight:bold;">Jeton:</label>
                <div style="display:flex; gap:5px; justify-content:center;">
                    <button onclick="setAnalysisPerspective(1)" id="perspectiveBtn1" style="flex:0 1 100px; padding:8px; background:#ef4444; color:white; border:none; border-radius:3px; font-size:0.85em; cursor:pointer; font-weight:bold; opacity:0.6;">🔴 Rouge</button>
                    <button onclick="setAnalysisPerspective(2)" id="perspectiveBtn2" style="flex:0 1 100px; padding:8px; background:#fbbf24; color:#333; border:none; border-radius:3px; font-size:0.85em; cursor:pointer; font-weight:bold; opacity:0.6;">🟡 Jaune</button>
                </div>
            </div>
            
            <div style="margin-bottom:15px;">
                <label style="font-size:0.85em; display:block; margin-bottom:8px; font-weight:bold;">Position de jeu:</label>
                <div style="display:flex; gap:5px; justify-content:center;">
                    <button onclick="setAnalysisPlayerRole(1)" id="roleBtn1" style="flex:0 1 auto; padding:8px 12px; background:#9ca3af; color:white; border:none; border-radius:3px; font-size:0.85em; cursor:pointer; font-weight:bold; opacity:0.6;">Joueur 1 (Première)</button>
                    <button onclick="setAnalysisPlayerRole(2)" id="roleBtn2" style="flex:0 1 auto; padding:8px 12px; background:#737373; color:white; border:none; border-radius:3px; font-size:0.85em; cursor:pointer; font-weight:bold; opacity:0.6;">Joueur 2 (Deuxième)</button>
                </div>
            </div>
            
            <div style="margin-bottom:15px;">
                <label style="font-size:0.85em; display:block; margin-bottom:5px; font-weight:bold;">Séquence (ex: 3131313):</label>
                <input type="text" id="sequenceAnalysisInput" placeholder="Entrez la séquence" maxlength="50" style="width:100%; padding:8px; border:2px solid #ddd; border-radius:5px; font-size:0.9em; box-sizing:border-box;">
            </div>
            
            <div style="margin-bottom:15px;">
                <label style="font-size:0.85em; display:block; margin-bottom:5px; font-weight:bold;">Difficulté:</label>
                <select id="analysisDifficultySelect" style="width:100%; padding:8px; border:2px solid #ddd; border-radius:5px; font-size:0.85em;">
                    <option value="1">Facile</option>
                    <option value="3" selected>Moyen</option>
                    <option value="5">Difficile</option>
                </select>
            </div>
            
            <button onclick="analyzeGameSequence()" class="menu-btn" style="margin-bottom:15px; width:100%; padding:12px;">Analyser</button>
            <div id="sequenceAnalysisResult" style="font-size:0.85em; color:#333; display:none; padding:10px; background:white; border-radius:3px; border-left:4px solid #ff9800;"></div>
        </div>
    </div>

    <!-- Modal Choix de Couleur -->
    <div id="colorModal" class="modal" style="display:none;">
        <div class="modal-content" style="text-align: center; max-width: 400px;">
            <h2 style="margin-bottom: 20px;">Choisir votre couleur</h2>
            <div style="display: flex; justify-content: center; gap: 30px; margin-bottom: 20px;">
                <div style="cursor: pointer; text-align: center;" onclick="confirmColorChoice('red')">
                    <div style="width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #FF6B6B, #DC143C); border: 4px solid #8B0000; border-radius: 50%; margin: 0 auto 10px; box-shadow: 0 4px 10px rgba(139,0,0,0.5);"></div>
                    <button style="padding: 10px 20px; background: #DC143C; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">ROUGE</button>
                </div>
                <div style="cursor: pointer; text-align: center;" onclick="confirmColorChoice('yellow')">
                    <div style="width: 80px; height: 80px; background: radial-gradient(circle at 30% 30%, #FFED4E, #FFD700); border: 4px solid #B8860B; border-radius: 50%; margin: 0 auto 10px; box-shadow: 0 4px 10px rgba(184,134,11,0.5);"></div>
                    <button style="padding: 10px 20px; background: #FFD700; color: #333; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">JAUNE</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/game.js"></script>
</body>
</html>
